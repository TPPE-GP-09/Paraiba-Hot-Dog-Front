<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Paraíba Hot Dog">
  <defs>
    <linearGradient id="bun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7D56A"/>
      <stop offset="100%" stop-color="#D9A52A"/>
    </linearGradient>
    <linearGradient id="sausage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF6B5B"/>
      <stop offset="100%" stop-color="#B83228"/>
    </linearGradient>
  </defs>

  <!-- pão de baixo -->
  <path d="M11 37.5c0-2.5 42-2.5 42 0v7.5c0 3.5-42 3.5-42 0v-7.5z" fill="url(#bun)"/>

  <!-- salsicha -->
  <rect x="9" y="29" width="46" height="11" rx="5.5" fill="url(#sausage)"/>

  <!-- mostarda -->
  <path
    d="M15 33.5c3.5-2.5 7 2.5 10.5 0s7 2.5 10.5 0 7 2.5 10.5 0"
    stroke="#E1BF00"
    stroke-width="2.75"
    stroke-linecap="round"
    fill="none"
  />

  <!-- pão de cima -->
  <path d="M9 29c0-11 46-11 46 0" fill="url(#bun)"/>

  <!-- brilho no pão -->
  <path
    d="M15 21.5c7.5-3.5 26.5-3.5 34 0"
    stroke="#FFF4D6"
    stroke-width="1.75"
    stroke-linecap="round"
    opacity="0.65"
  />
</svg>
